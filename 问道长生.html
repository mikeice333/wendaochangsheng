<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>问道长生</title>
<style>
:root{
  --bg:#f5f0e8;--paper:#2a2018;--paper-dim:#8a8070;
  --ink:#c45a3c;--ink-dim:rgba(196,90,60,0.12);--ink-glow:rgba(196,90,60,0.04);
  --jade:#5a7a5a;--gold:#8a6a20;
  --font-cn:'STKaiti','KaiTi','楷体','SimSun',serif;
  --font-num:'SimSun','STSong','宋体',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:var(--font-cn);font-size:18px;line-height:1.8;display:flex;flex-direction:column;overflow:hidden;user-select:none;height:100vh}
#start-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center}
#start-overlay.hidden{display:none}
.start-title{font-size:48px;color:var(--paper);letter-spacing:8px;margin-bottom:4px}
.start-sub{font-size:16px;color:var(--paper-dim);letter-spacing:4px;margin-bottom:48px}
.btn{display:block;width:200px;margin:8px auto;padding:12px 0;font-family:var(--font-cn);font-size:18px;color:var(--paper);background:var(--ink-dim);border:1px solid rgba(196,90,60,0.2);border-radius:4px;cursor:pointer;text-align:center;letter-spacing:3px;transition:all 0.2s}
.btn:hover{background:rgba(196,90,60,0.15);border-color:var(--ink)}
.btn.sm{display:inline-block;width:auto;padding:6px 16px;font-size:15px;margin:3px;letter-spacing:1px}
.btn.danger{color:rgba(196,90,60,0.5);border-color:rgba(196,90,60,0.1)}
.btn.danger:hover{color:var(--ink);border-color:var(--ink)}
.btn.dim{opacity:0.3;pointer-events:none}
#start-delete{position:absolute;bottom:20px;right:24px;font-size:13px;color:rgba(196,90,60,0.2);cursor:pointer;transition:color 0.3s}
#start-delete:hover{color:var(--ink)}

.nav{display:none;justify-content:center;gap:0;padding:14px 16px 0;border-bottom:1px solid rgba(196,90,60,0.1);flex-shrink:0;background:var(--bg)}
.nav.show{display:flex}
.nav-btn{font-family:var(--font-cn);font-size:18px;color:var(--paper-dim);background:none;border:none;padding:8px 20px 10px;cursor:pointer;letter-spacing:3px;position:relative;transition:color 0.3s}
.nav-btn:hover{color:var(--ink)}.nav-btn.active{color:var(--ink)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--ink);border-radius:1px}

.page-wrap{display:none;flex:1;overflow-y:auto;padding:16px 24px 40px;background:var(--bg)}
.page-wrap.show{display:block}
.page{display:none;max-width:600px;margin:0 auto}
.page.active{display:block}

.section{border:1px solid rgba(196,90,60,0.08);border-radius:6px;padding:14px 16px;margin:12px 0;background:rgba(255,255,255,0.4)}
.section-title{font-size:14px;color:var(--ink);letter-spacing:3px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(196,90,60,0.06)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
.stat-grid .sg{display:flex;justify-content:space-between;font-size:15px}
.stat-grid .sg .sl{color:var(--paper-dim)}.stat-grid .sg .sv{color:var(--paper);font-family:var(--font-num)}
.cult-header{display:flex;justify-content:space-between;padding:6px 0 12px;border-bottom:1px solid rgba(196,90,60,0.05);margin-bottom:14px}
.cult-header .chl{font-size:14px;color:var(--paper-dim);letter-spacing:1px}
.cult-header .chv{font-size:24px;color:var(--paper)}.cult-header .chv.sl{color:var(--ink)}
.cult-header .ch-l{text-align:left}.cult-header .ch-r{text-align:right}
.realm-display{text-align:center;padding:10px 0 6px;font-size:22px;color:var(--paper);letter-spacing:3px}
.realm-display .stage{font-size:15px;color:var(--paper-dim);margin-top:2px}
.progress-wrap{margin:10px 0}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--paper-dim);margin-bottom:4px}
.progress-track{height:5px;background:rgba(0,0,0,0.04);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--ink);border-radius:3px;transition:width 0.4s}
.break-btn{text-align:center;margin:14px 0}
.warn-text{text-align:center;font-size:13px;color:var(--gold);margin:6px 0;letter-spacing:1px}
.equip-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:15px;border-bottom:1px solid rgba(196,90,60,0.03)}
.equip-row .en{color:var(--paper)}.equip-row .ev{color:var(--paper-dim);font-family:var(--font-num);font-size:13px}
.equip-row .es{font-size:13px;color:var(--paper-dim)}.equip-row .es.empty{color:rgba(138,128,112,0.2)}
.equip-row .es.act{color:var(--ink);cursor:pointer}

.floor-header{text-align:center;padding:6px 0}
.floor-header .fh{font-size:24px;color:var(--paper);letter-spacing:3px}
.floor-header .fs{font-size:14px;color:var(--paper-dim);margin-top:2px}
.battle-area{display:flex;gap:14px;margin:14px 0}
.battle-col{flex:1;border:1px solid rgba(196,90,60,0.08);border-radius:6px;padding:12px;text-align:center;background:rgba(255,255,255,0.4)}
.battle-col .bc-title{font-size:16px;color:var(--ink);letter-spacing:2px;margin-bottom:8px}
.battle-col .hp-bar{height:8px;background:rgba(0,0,0,0.04);border-radius:4px;overflow:hidden;margin:6px 0}
.battle-col .hp-fill{height:100%;background:var(--jade);border-radius:4px}
.battle-col .hp-text{font-size:13px;color:var(--paper-dim);font-family:var(--font-num)}
.battle-col .bs{font-size:13px;color:var(--paper-dim);margin-top:4px;line-height:1.6}
.combat-log{border:1px solid rgba(196,90,60,0.06);border-radius:6px;padding:12px 14px;max-height:180px;overflow-y:auto;font-size:14px;line-height:1.7;color:var(--paper-dim);background:rgba(255,255,255,0.3)}
.combat-log .cl-hit{color:var(--paper)}.combat-log .cl-crit{color:var(--gold)}
.combat-log .cl-dodge{color:var(--jade)}.combat-log .cl-reward{color:var(--ink)}
.combat-log .cl-dead{color:rgba(196,90,60,0.4)}
.action-row{display:flex;justify-content:center;gap:12px;margin-top:14px}

.shop-tabs,.equip-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid rgba(196,90,60,0.06)}
.shop-tab,.equip-tab{font-family:var(--font-cn);font-size:17px;color:var(--paper-dim);background:none;border:none;padding:8px 20px;cursor:pointer;letter-spacing:2px;transition:color 0.3s}
.shop-tab.active,.equip-tab.active{color:var(--ink);border-bottom:2px solid var(--ink);margin-bottom:-1px}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(196,90,60,0.03);font-size:15px}
.shop-item .si-name{color:var(--paper);flex:1}
.shop-item .si-info{color:var(--paper-dim);font-family:var(--font-num);margin-right:10px;font-size:13px}
.shop-item .si-cost{font-family:var(--font-num);font-size:13px;padding:3px 10px;border:1px solid var(--ink-dim);border-radius:3px;color:var(--ink);cursor:pointer;white-space:nowrap}
.refresh-btn{text-align:center;margin-top:12px}
.info-card{border:1px solid rgba(196,90,60,0.08);border-radius:6px;padding:16px;text-align:center;margin:14px 0;background:rgba(255,255,255,0.4)}
.info-card .ic-title{font-size:20px;color:var(--ink);letter-spacing:3px;margin-bottom:8px}
.info-card .ic-text{font-size:15px;color:var(--paper-dim);line-height:1.8}
.menu-list{display:flex;flex-direction:column;gap:10px;margin:20px 0}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(245,240,232,0.92);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:var(--bg);border:1px solid var(--ink-dim);border-radius:8px;padding:24px 28px;min-width:340px;max-width:440px;max-height:75vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.dialog-title{font-size:22px;color:var(--ink);text-align:center;margin-bottom:14px;letter-spacing:4px}
.save-slot{border:1px solid rgba(196,90,60,0.1);border-radius:6px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.4)}
.save-slot:hover{border-color:var(--ink);background:var(--ink-glow)}
.save-slot .sl-name{font-size:16px;color:var(--paper)}
.save-slot .sl-info{font-size:12px;color:var(--paper-dim);font-family:var(--font-num);margin-top:2px;line-height:1.6}
.save-slot .sl-empty{font-size:14px;color:rgba(138,128,112,0.2)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;color:var(--paper);pointer-events:none;z-index:200;background:var(--bg);border:1px solid var(--ink-dim);border-radius:6px;padding:10px 24px;box-shadow:0 4px 16px rgba(0,0,0,0.08);animation:toast-in 2s ease-out forwards}
@keyframes toast-in{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}10%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0}}

.name-input{width:160px;font-family:var(--font-cn);font-size:22px;color:var(--ink);background:rgba(196,90,60,0.04);border:1px solid var(--ink-dim);border-radius:4px;padding:6px 12px;text-align:center;outline:none}
.name-input:focus{border-color:var(--ink)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(196,90,60,0.1);border-radius:2px}
#ov-story{background:var(--bg);z-index:60;flex-direction:column}
#ov-story .st{font-size:22px;color:var(--paper);line-height:2.2;min-height:160px;text-align:center;max-width:400px;padding:0 20px}
input,select{background:rgba(255,255,255,0.6);border:1px solid var(--ink-dim);color:var(--paper);padding:2px 6px;font-size:14px;border-radius:3px}
</style>
</head>
<body>

<div id="start-overlay">
  <div class="start-title">问道长生</div>
  <div class="start-sub">— 文字修仙放置 —</div>
  <button class="btn" onclick="startStory()">开 始 游 戏</button>
  <button class="btn" onclick="openSaveDialog('load')">读 取 存 档</button>
  <div id="start-delete" onclick="deleteSaves()">删除存档</div>
</div>

<div class="overlay" id="ov-story"><div class="st" id="story-text"></div><div id="story-action" style="margin-top:30px;text-align:center"></div></div>

<div class="nav" id="main-nav">
  <button class="nav-btn active" data-page="cultivation">修炼</button>
  <button class="nav-btn" data-page="abyss">炼魔渊</button>
  <button class="nav-btn" data-page="shop">万宝阁</button>
  <button class="nav-btn" data-page="equip">装备</button>
  <button class="nav-btn" data-page="rebirth">轮回</button>
  <button class="nav-btn" data-page="menu">菜单</button>
  <button class="nav-btn" data-page="debug" style="display:none" id="nav-debug">调试</button>
</div>

<div class="page-wrap" id="page-wrap">
<div class="page active" id="page-cultivation">
  <div class="cult-header">
    <div class="ch-l"><div class="chl" id="cu-name"></div><div class="chl" id="cu-gold"></div></div>
    <div class="ch-r"><div class="chl" id="cu-title"></div><div class="chl" id="cu-pts"></div></div>
  </div>
  <div class="realm-display" id="cu-realm"></div>
  <div class="progress-wrap"><div class="progress-label"><span>修为积累</span><span style="font-family:var(--font-num)" id="cu-progress-text"></span></div><div class="progress-track"><div class="progress-fill" id="cu-bar"></div></div><div style="text-align:right;font-size:12px;color:var(--paper-dim);margin-top:3px">速率：<span style="font-family:var(--font-num);color:var(--ink)" id="cu-rate"></span>/秒</div></div>
  <div class="break-btn" id="cu-break-area"></div>
  <div class="warn-text" id="cu-warn"></div>
  <div class="section"><div class="section-title">属 性</div><div class="stat-grid" id="cu-stats"></div></div>
  <div class="section"><div class="section-title">装备功法</div><div id="cu-techs"></div></div>
  <div class="section"><div class="section-title">装备法宝</div><div id="cu-arts"></div></div>
</div>
<div class="page" id="page-abyss">
  <div class="floor-header"><div class="fh" id="ab-title">炼 魔 渊</div><div class="fs" id="ab-floor"></div></div>
  <div class="battle-area">
    <div class="battle-col"><div class="bc-title">▎你</div><div class="hp-bar"><div class="hp-fill" id="ab-pHpBar"></div></div><div class="hp-text" id="ab-pHp"></div><div class="bs" id="ab-pStats"></div></div>
    <div class="battle-col"><div class="bc-title">▎怪物</div><div class="hp-bar"><div class="hp-fill" id="ab-mHpBar"></div></div><div class="hp-text" id="ab-mHp"></div><div class="bs" id="ab-mStats"></div></div>
  </div>
  <div style="text-align:center;font-size:13px;color:var(--paper-dim);margin:6px 0" id="ab-res"></div>
  <div class="combat-log" id="ab-log"></div>
  <div class="action-row">
    <button class="btn sm dim" id="ab-prev">上一层</button>
    <button class="btn sm dim" id="ab-next">下一层</button>
    <button class="btn sm" onclick="jumpFloor()">跳转楼层</button>
    <button class="btn sm" onclick="goldToCult()">灵石换修为</button>
  </div>
</div>
<div class="page" id="page-shop">
  <div class="realm-display" style="font-size:20px">万 宝 阁</div>
  <div style="text-align:center;font-size:14px;color:var(--paper-dim);margin-bottom:12px" id="sp-info"></div>
  <div class="shop-tabs"><button class="shop-tab active" onclick="switchShopTab('jing')">藏经阁</button><button class="shop-tab" onclick="switchShopTab('bing')">藏兵阁</button><button class="shop-tab" onclick="switchShopTab('ex')">兑换</button></div>
  <div id="sp-jing"></div><div id="sp-bing" style="display:none"></div><div id="sp-ex" style="display:none"></div>
</div>
<div class="page" id="page-equip">
  <div class="realm-display" style="font-size:20px">装 备 管 理</div>
  <div style="text-align:center;font-size:13px;color:var(--paper-dim);margin-bottom:10px" id="eq-info"></div>
  <div class="equip-tabs"><button class="equip-tab active" onclick="switchEquipTab('tech')">功法</button><button class="equip-tab" onclick="switchEquipTab('art')">法宝</button><button class="equip-tab" onclick="switchEquipTab('enh')">炼化</button><button class="equip-tab" onclick="switchEquipTab('title')">称号</button><button class="equip-tab" onclick="switchEquipTab('fuse')">融合</button></div>
  <div id="eq-tech"></div><div id="eq-art" style="display:none"></div><div id="eq-enh" style="display:none"></div><div id="eq-title" style="display:none"></div><div id="eq-fuse" style="display:none"></div>
</div>
<div class="page" id="page-rebirth">
  <div class="realm-display" style="font-size:20px">转 世 轮 回</div>
  <div class="info-card"><div class="ic-title">轮回预览</div><div class="ic-text" id="rb-preview"></div></div>
  <div class="info-card"><div class="ic-title" style="color:rgba(196,90,60,0.5)">⚠ 轮回将清除</div><div class="ic-text" style="color:rgba(196,90,60,0.3)">境界、修为、灵石、所有未装备的功法</div></div>
  <button class="btn danger" id="rb-btn" onclick="doReincarnation()">确 认 轮 回</button>
</div>
<div class="page" id="page-menu">
  <div class="realm-display" style="font-size:20px">菜 单</div>
  <div class="menu-list">
    <button class="btn" onclick="showGuide()">游 戏 说 明</button>
    <button class="btn" onclick="openSaveDialog('save')">保 存 存 档</button>
    <button class="btn" onclick="openSaveDialog('load')">读 取 存 档</button>
    <button class="btn danger" onclick="backToStart()">返回开始界面</button>
  </div>
</div>
<div class="page" id="page-debug">
  <div class="realm-display" style="font-size:20px;color:var(--gold)">开发者调试</div>
  <div class="section"><div class="section-title">资源</div><div style="font-size:14px;line-height:2">
    修为：<input id="db-cult" type="number" style="width:120px" step="1000"> <button class="btn sm" onclick="dbSet('cult')">设 置</button><br>
    灵石：<input id="db-gold" type="number" style="width:120px" step="1000"> <button class="btn sm" onclick="dbSet('gold')">设 置</button><br>
    轮回点：<input id="db-rp" type="number" style="width:120px" step="100"> <button class="btn sm" onclick="dbSet('rp')">设 置</button><br>
    轮回次数：<input id="db-rc" type="number" style="width:120px"> <button class="btn sm" onclick="dbSet('rc')">设 置</button><br>
    境界：<select id="db-realm"></select> <button class="btn sm" onclick="dbSet('realm')">设 置</button><br>
    炼魔渊层数：<input id="db-floor" type="number" style="width:80px"> <button class="btn sm" onclick="dbSet('floor')">设 置</button>
  </div></div>
  <div class="section"><div class="section-title">材料</div><div id="db-mats" style="font-size:14px;line-height:2"></div></div>
  <div class="section"><div class="section-title">法宝（赋予强化等级）</div><div id="db-arts" style="font-size:14px;line-height:2"></div></div>
  <div class="section"><div class="section-title">功法（赋予等级）</div><div id="db-techs" style="font-size:14px;line-height:2"></div></div>
  <div class="section"><div class="section-title">称号</div><div id="db-titles" style="font-size:14px;line-height:2"></div></div>
</div>
</div>

<div class="overlay" id="ov-guide"><div class="dialog"><div class="dialog-title">游戏说明</div><div style="font-size:15px;color:var(--paper-dim);line-height:2">1. 装备功法自动修炼获取修为<br>2. 修为达标点「突破」进阶<br>3. 筑基境·筑元解锁炼魔渊打怪得灵石<br>4. 灵石达标解锁万宝阁买功法法宝<br>5. 化丹境解锁转世轮回<br>6. 轮回点可抽取称号、刷新商店</div><button class="btn sm" onclick="closeD('guide')" style="margin-top:14px">关 闭</button></div></div>
<div class="overlay" id="ov-save"><div class="dialog"><div class="dialog-title" id="save-title">存档</div><div id="save-slots"></div><button class="btn sm" onclick="closeD('save')" style="margin-top:10px">关 闭</button></div></div>
<div class="overlay" id="ov-offline"><div class="dialog" style="text-align:center" id="offline-msg"></div></div>
<div id="toast-area"></div>

<script>
var $=function(id){return document.getElementById(id);};
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;$('toast-area').appendChild(t);setTimeout(function(){t.remove();},2100);}

var C={
  realms:[
    {name:'筑基境',stages:['锻体','筑元','开脉'],reincRate:0.5,atk:5,def:3,hp:20},
    {name:'明气境',stages:['气海初化','唤云召霞','天霖降顶'],reincRate:0.6,atk:10,def:5,hp:40},
    {name:'玄光境',stages:['灵明初照','耀夜如昼','灵明彻照'],reincRate:0.7,atk:15,def:8,hp:60},
    {name:'化丹境',stages:['丹煞初凝','丹力破壳','凝丹化印'],reincRate:0.8,atk:20,def:12,hp:90},
    {name:'元婴境',stages:['元婴罡云','三花聚顶','元婴法身'],reincRate:1.0,atk:25,def:16,hp:130},
    {name:'象相境',stages:['显阳灵身','初辟洞天','蕴化元胎'],reincRate:1.2,atk:30,def:20,hp:180},
    {name:'凡蜕境',stages:['神意千年','斩古存今','渡觉半仙','永寿唯一'],reincRate:1.5,atk:35,def:25,hp:240},
    {name:'真阳境',stages:['诛相合一','永续真阳','化实为虚'],reincRate:2.0,atk:40,def:30,hp:320},
    {name:'炼神境',stages:['开天辟地','解真诸有','道衍大德'],reincRate:3.0,atk:50,def:38,hp:420},
    {name:'至人境',stages:['争道','御道','衍道'],reincRate:5.0,atk:60,def:48,hp:550}
  ],
  cultReqs:[[5,15,30],[150,200,250],[10000,30000,80000],[200000,500000,1200000],[3000000,8000000,20000000],[50000000,120000000,300000000],[800000000,2000000000,5000000000,12000000000],[30000000000,70000000000,160000000000],[400000000000,1000000000000,3000000000000],[8000000000000,20000000000000,50000000000000]],
  breakMats:['凝气丹','明心玉','玄光露','化丹砂','九转还魂草','象相天晶','蜕凡仙露','真阳神火','炼神星核'],

function getTech(i){return C.techs[i];}
function getArt(i){return C.artifacts[i];}
function isFused(id){return typeof id==='string'&&id[0]==='f';}
function getFusedTech(id){return GS.fusedTechs[id];}
function techTier(id){if(!isFused(id)){var t=C.techs[id];return t?t.tier:0;}var ft=getFusedTech(id);return ft?ft.tier:0;}
function isFuseIdxValid(id){
  if(!isFused(id))return !!(C.techs[id]&&GS.ownedTechs[id]&&GS.ownedTechs[id]>=10);
  return !!GS.fusedTechs[id];
}
function fmt(n){
  if(n<1e4)return Math.floor(n).toString();
  var u=['','万','亿','兆','京','垓','秭','穰','沟','涧','正','载'],i=0;
  while(n>=1e4&&i<u.length-1){n/=1e4;i++;}
  return Math.round(n)+u[i];
}

function getEnhMult(enh){
  if(isNaN(enh)||!isFinite(enh)||enh<0)enh=0;
  if(enh<=7)return 1+enh*0.05;
  if(enh<=10)return 1.35+(enh-7)*0.12;
  if(enh<=13)return 1.71+(enh-10)*0.25;
  if(enh===14)return 2.46;
  return 2.46*2; // +15 = ×2 of +14
}

function getArtDesc(a,enh){
  var em=getEnhMult(enh),p=[];
  if(a.atk)p.push('攻+'+Math.floor(a.atk*em)+'%');
  if(a.def)p.push('防+'+Math.floor(a.def*em)+'%');
  if(a.hp)p.push('HP+'+Math.floor(a.hp*em)+'%');
  if(a.crit>0)p.push('暴+'+Math.floor(a.crit*em)+'%');
  if(a.cdmg>0)p.push('暴伤+'+Math.floor(a.cdmg*em)+'%');
  if(a.dodge>0)p.push('闪+'+Math.floor(a.dodge*em)+'%');
  if(a.special)p.push(a.special);return p.join(' ');
}

function getTechBonus(techIdx){
  var t=getTech(techIdx),lv=GS.ownedTechs[techIdx]||1;if(lv<10)return null;
  var b=C.techBonusTiers[t.tier-1];
  return {atk:b.atk,def:b.def,hp:b.hp,crit:b.crit,cdmg:b.cdmg,dodge:b.dodge};
}

function getTechBonusDescForSingle(id){
  if(isFused(id)){var ft=getFusedTech(id);if(!ft)return'';var p=[];
    if(ft.atkMul>1)p.push('攻×'+fmt(Math.round(ft.atkMul)));
    if(ft.defMul>1)p.push('防×'+fmt(Math.round(ft.defMul)));
    if(ft.hpMul>1)p.push('血×'+fmt(Math.round(ft.hpMul)));
    if(ft.crit>0)p.push('暴+'+fmt(ft.crit)+'%');
    if(ft.cdmg>0)p.push('倍+'+fmt(ft.cdmg)+'%');
    if(ft.dodge>0)p.push('闪+'+fmt(ft.dodge)+'%');
    return p.join(' ');}
  var b=getTechBonus(id);if(!b)return '';
  var p=[];
  if(b.atk>1)p.push('攻×'+b.atk);
  if(b.def>1)p.push('防×'+b.def);
  if(b.hp>1)p.push('血×'+b.hp);
  if(b.crit>0)p.push('暴+'+b.crit+'%');
  if(b.cdmg>0)p.push('倍+'+b.cdmg+'%');
  if(b.dodge>0)p.push('闪+'+b.dodge+'%');
  return p.join(' ');
}

function getPlayerStats(){
  var r=C.realms[GS.realm.major],s={rateMul:1,atkMul:1,defMul:1,goldMul:1,xpMul:1,shopDisc:1,critBonus:0,cdmgBonus:0,dodgeBonus:0,enhBonus:0,noDestroy:false};
  if(GS.equippedTitle>=0&&GS.equippedTitle<C.titles.length)C.titles[GS.equippedTitle].eff(s);
  var atkMul=1,defMul=1,hpMul=1,crit=3,cdmg=0,dodge=3;
  // artifacts: percentage bonuses
  for(var i=0;i<GS.equippedArts.length;i++){
    var a=getArt(GS.equippedArts[i]),enh=GS.artEnhance[GS.equippedArts[i]]||0,em=getEnhMult(enh);
    atkMul*=(1+(a.atk||0)/100*em);defMul*=(1+(a.def||0)/100*em);hpMul*=(1+(a.hp||0)/100*em);
    if(a.crit)crit+=a.crit*em;if(a.cdmg)cdmg+=a.cdmg*em;if(a.dodge)dodge+=a.dodge*em;
  }
  // tech bonuses
  for(var i=0;i<GS.equippedTechs.length;i++){
    var id=GS.equippedTechs[i];if(!isFused(id)){var b=getTechBonus(id);if(!b)continue;
    atkMul*=b.atk;defMul*=b.def;hpMul*=b.hp;crit+=b.crit||0;cdmg+=b.cdmg||0;dodge+=b.dodge||0;}
    else{var ft=getFusedTech(id);if(!ft)continue;
    atkMul*=ft.atkMul;defMul*=ft.defMul;hpMul*=ft.hpMul;crit+=ft.crit||0;cdmg+=ft.cdmg||0;dodge+=ft.dodge||0;}
  }
  var atk=Math.floor(r.atk*atkMul*s.atkMul),def=Math.floor(r.def*defMul*s.defMul),hp=Math.floor(r.hp*hpMul);
  function ok(n,d){return isNaN(n)?d:n;}
  return {atk:ok(atk,0),def:ok(def,0),hp:ok(hp,1),maxHp:ok(hp,1),crit:ok(Math.min(crit+s.critBonus,100),0),cdmg:ok(200+cdmg+s.cdmgBonus,200),dodge:ok(Math.min(dodge+s.dodgeBonus,70),0),rateMul:ok(s.rateMul,1),goldMul:ok(s.goldMul,1),xpMul:ok(s.xpMul,1),shopDisc:ok(s.shopDisc,1),enhBonus:ok(s.enhBonus,0),noDestroy:s.noDestroy||false};
}

function getTechRate(){var r=0;for(var i=0;i<GS.equippedTechs.length;i++){var id=GS.equippedTechs[i];if(isFused(id)){var ft=getFusedTech(id);if(ft)r+=ft.rate;}else{var t=C.techs[id];if(t)r+=t.rate/10*(GS.ownedTechs[id]||1);}}var m=r*getPlayerStats().rateMul;return isNaN(m)?0:m;}

function weightedSample(arr,weights,count){
  var result=[],pool=arr.slice();for(var c=0;c<count&&pool.length>0;c++){
    var total=0;for(var i=0;i<pool.length;i++)total+=weights[arr.indexOf(pool[i])]||1;

    for(var i=0;i<pool.length;i++){sum+=weights[arr.indexOf(pool[i])]||1;if(r<=sum){pi=i;break;}}
    if(pi>=0){result.push(pool[pi]);pool.splice(pi,1);}

}

function doFuse(){
  if(GS.fusionCount>=2){toast('本轮融合次数已用完');return;}
  if(_fuseSelA===null||_fuseSelB===null)return;
  if(!isFuseIdxValid(_fuseSelA)||!isFuseIdxValid(_fuseSelB)){_fuseSelA=_fuseSelB=null;toast('选择已失效，请重新选择');updateEquip();return;}
  var tier=techTier(_fuseSelA),cost=getFuseCost(),rate=getFuseRate(tier);
  if(GS.reincPoints<cost){toast('轮回点不足');return;}
  GS.reincPoints-=cost;GS.fusionCount++;
  if(Math.random()*100>=rate){_fuseSelA=_fuseSelB=null;toast('融合失败！');updateEquip();updateCultUI();return;}
  var stA=getFuseStats(_fuseSelA),stB=getFuseStats(_fuseSelB);

  var bonuses=[];

  if(stA.defMul>1||stB.defMul>1)bonuses.push({k:'def',v:rDef});
  if(stA.hpMul>1||stB.hpMul>1)bonuses.push({k:'hp',v:rHp});
  if(stA.crit>0||stB.crit>0)bonuses.push({k:'crit',v:rCrit});
  if(stA.cdmg>0||stB.cdmg>0)bonuses.push({k:'cdmg',v:rCdmg});
  if(stA.dodge>0||stB.dodge>0)bonuses.push({k:'dodge',v:rDodge});
  var removeK=null,boostK=null;
  if(bonuses.length>2){var ri=Math.floor(Math.random()*bonuses.length);removeK=bonuses[ri].k;bonuses.splice(ri,1);var bi=Math.floor(Math.random()*bonuses.length);boostK=bonuses[bi].k;}
  var mul=function(k){return k===boostK?0.6:0.51;};
  var ft={name:name,tier:tier,rate:Math.floor((stA.rate+stB.rate)*1.5),
    atkMul:removeK==='atk'?1:Math.floor(rAtk*mul('atk')),
    defMul:removeK==='def'?1:Math.floor(rDef*mul('def')),
    hpMul:removeK==='hp'?1:Math.floor(rHp*mul('hp')),
    crit:removeK==='crit'?0:Math.floor(rCrit*mul('crit')),

    dodge:removeK==='dodge'?0:Math.floor(rDodge*mul('dodge'))};

  if(!isFused(srcB))delete GS.ownedTechs[srcB];else delete GS.fusedTechs[srcB];

}

function deleteSaves(){for(var i=0;i<3;i++)try{localStorage.removeItem('wcds_slot_'+i);}catch(e){}toast('存档已删除');}

var _saveMode='load';
function openSaveDialog(mode){_saveMode=mode;$('save-title').textContent=mode==='save'?'保存存档':'读取存档';var h='';for(var i=0;i<3;i++){var key='wcds_slot_'+i,raw=null;try{raw=localStorage.getItem(key);}catch(e){}if(raw){try{var d=JSON.parse(raw);h+='<div class="save-slot" onclick="onSlot('+i+',true)"><div class="sl-name">存档 '+(i+1)+'</div><div class="sl-info">'+d.name+' · '+(C.realms[d.realm.major]?C.realms[d.realm.major].name:'?')+' · 灵石 '+fmt(d.gold)+' · 轮回 '+d.reincCount+'次<br>'+new Date(d.saveTime).toLocaleString()+'</div></div>';}catch(e){h+='<div class="save-slot" onclick="onSlot('+i+',true)"><div class="sl-name">存档 '+(i+1)+'</div><div class="sl-empty">(损坏)</div></div>';}}else{h+='<div class="save-slot" onclick="onSlot('+i+',false)"><div class="sl-name">存档 '+(i+1)+'</div><div class="sl-empty">— 空 —</div></div>';}}$('save-slots').innerHTML=h;$('ov-save').classList.add('show');}
function onSlot(n,has){if(_saveMode==='save'){var d=buildSave();d.saveTime=Date.now();try{localStorage.setItem('wcds_slot_'+n,JSON.stringify(d));toast('已保存到 存档'+(n+1));}catch(e){toast('保存失败');}closeD('save');}else{if(!has){toast('该档位为空');return;}try{var r=localStorage.getItem('wcds_slot_'+n);if(!r){toast('读取失败');return;}applySave(JSON.parse(r));enterGameUI();closeD('save');toast('存档'+(n+1)+' 已加载');checkDebug();}catch(e){toast('读取失败');}}}

function enterGameUI(){$('start-overlay').classList.add('hidden');$('main-nav').classList.add('show');$('page-wrap').classList.add('show');GS.gameStarted=true;GS.currentPage='cultivation';initShopPools();updateCultUI();navTo('cultivation');}
function startGame(){GS.realm={major:0,minor:0};GS.cultivation=0;GS.gold=0;GS.reincPoints=0;GS.reincCount=0;GS.equippedTechs=[];GS.equippedArts=[];GS.ownedTechs={};GS.ownedArts=[];GS.artEnhance={};GS.ownedTitles=[];GS.equippedTitle=-1;GS.techUpgradeCount=0;GS.treasures={};GS.jingPool=[];GS.bingPool=[];GS.fusedTechs={};GS.fusedNextId=0;GS.fusionCount=0;AB.active=false;AB.log=[];GS.ownedTechs[0]=1;GS.equippedTechs.push(0);enterGameUI();}
function backToStart(){$('start-overlay').classList.remove('hidden');$('main-nav').classList.remove('show');$('page-wrap').classList.remove('show');GS.gameStarted=false;}

var _storyLines=['你跋山涉水，历经九死一生，<br>终于寻到了传说中的修仙宗门——<br>问道宗。','然而入门测试时，宗门长老面沉如水，<br>拂袖长叹：<br><br>"根骨驳杂，灵脉枯涩……<br>此等资质，莫说内门，<br>便是外门杂役也嫌多余。"','一卷薄薄的竹简被扔到你脚边。<br><br>"这本《吐纳术》拿去，自行修炼。<br>若有机缘，再来叩山门罢。"','你伫立原地，拳心紧攥。<br>长老的话语如冰锥刺骨，<br>却浇不灭你眼底那簇幽火。<br><br>你在心底暗暗发誓——<br><br>"我，<span id="story-name-slot">____</span>，终有一日，<br>要踏入那传说中的至人境界！"'];
var _si=0;
function startStory(){var o=$('ov-story');o.classList.add('show');_si=0;showNext();}
function showNext(){if(_si>=_storyLines.length){$('ov-story').classList.remove('show');startGame();return;}var t=_storyLines[_si];$('story-text').innerHTML=t;if(_si===3){$('story-action').innerHTML='<input class="name-input" id="name-input" placeholder="输入姓名" maxlength="6"><br><br><button class="btn sm" onclick="confirmName()">确 定</button>';}else{$('story-action').innerHTML='<button class="btn sm" onclick="showNext()">继 续</button>';}_si++;}
function confirmName(){var n=$('name-input').value||'无名';GS.name=n;$('story-name-slot').textContent=n;$('story-action').innerHTML='<button class="btn sm" onclick="showNext()">继 续</button>';checkDebug();}

var IS_DEBUG=false;
function checkDebug(){IS_DEBUG=(GS.name==='260509');$('nav-debug').style.display=IS_DEBUG?'':'none';}
function initDebugPage(){
  var s='';for(var i=0;i<C.realms.length;i++)s+='<option value="'+i+'">'+C.realms[i].name+'</option>';$('db-realm').innerHTML=s;
  var mh='',mn=['庚金','息土','溟水','若木','离火'];for(var i=0;i<mn.length;i++)mh+=mn[i]+'：<input id="db-mat-'+i+'" type="number" style="width:60px" value="'+(GS.treasures[mn[i]]||0)+'"> ';$('db-mats').innerHTML=mh+'<br><button class="btn sm" onclick="dbSet(\'mats\')">全部设置</button>';
  var ah='';for(var j=0;j<C.artifacts.length;j++){var a=C.artifacts[j],ow=GS.ownedArts.indexOf(j)>=0;ah+='<span style="color:'+(ow?'var(--paper)':'var(--paper-dim)')+'">'+a.name+'</span> 强化:<input id="db-ae-'+j+'" type="number" style="width:40px" value="'+(GS.artEnhance[j]||0)+'"> '+(!ow?'<button class="btn sm" onclick="dbAddArt('+j+')" style="font-size:11px">获得</button>':'');if((j+1)%3===0)ah+='<br>';}$('db-arts').innerHTML=ah+'<br><button class="btn sm" onclick="dbSet(\'arts\')">应用强化</button>';
  var th='';for(var k=0;k<C.techs.length;k++){var t=C.techs[k],lv=GS.ownedTechs[k]||0;th+='<span style="color:'+(lv>0?'var(--paper)':'var(--paper-dim)')+'">'+t.name+'</span> Lv:<input id="db-tl-'+k+'" type="number" style="width:40px" value="'+lv+'"> ';if((k+1)%3===0)th+='<br>';}$('db-techs').innerHTML=th+'<br><button class="btn sm" onclick="dbSet(\'techs\')">应用</button>';
  var tth='';for(var t=0;t<C.titles.length;t++){var has=GS.ownedTitles.indexOf(t)>=0;tth+='<span style="color:'+(has?'var(--paper)':'var(--paper-dim)')+'">'+C.titles[t].name+'</span> '+(has?'':'<button class="btn sm" onclick="dbAddTitle('+t+')" style="font-size:11px">获得</button>');if((t+1)%5===0)tth+='<br>';}$('db-titles').innerHTML=tth;
}
function dbSet(type){
  if(type==='cult')GS.cultivation=parseInt($('db-cult').value)||0;else if(type==='gold')GS.gold=parseInt($('db-gold').value)||0;else if(type==='rp')GS.reincPoints=parseInt($('db-rp').value)||0;else if(type==='rc')GS.reincCount=parseInt($('db-rc').value)||0;
  else if(type==='realm'){GS.realm.major=parseInt($('db-realm').value)||0;GS.realm.minor=0;}else if(type==='floor'){AB.floor=parseInt($('db-floor').value)||1;AB.killsThisFloor=0;if(AB.active)spawnMonster();}
  else if(type==='mats'){var mn=['庚金','息土','溟水','若木','离火'];for(var i=0;i<mn.length;i++){var v=parseInt($('db-mat-'+i).value)||0;if(v)GS.treasures[mn[i]]=v;else delete GS.treasures[mn[i]];}}
  else if(type==='arts'){for(var j=0;j<C.artifacts.length;j++){var v=parseInt($('db-ae-'+j).value)||0;if(v)GS.artEnhance[j]=v;else delete GS.artEnhance[j];}}
  else if(type==='techs'){for(var k=0;k<C.techs.length;k++){var v=parseInt($('db-tl-'+k).value)||0;if(v){GS.ownedTechs[k]=v;if(GS.equippedTechs.indexOf(k)<0&&GS.equippedTechs.length<3)GS.equippedTechs.push(k);}else{delete GS.ownedTechs[k];var ei=GS.equippedTechs.indexOf(k);if(ei>=0)GS.equippedTechs.splice(ei,1);}}}
  toast('设置完成');updateCultUI();}
function dbAddArt(idx){if(GS.ownedArts.indexOf(idx)<0){GS.ownedArts.push(idx);toast('获得 '+C.artifacts[idx].name);initDebugPage();}}
function dbAddTitle(idx){if(GS.ownedTitles.indexOf(idx)<0){GS.ownedTitles.push(idx);toast('获得 '+C.titles[idx].name);initDebugPage();}}

var _lastTS=0,_cultAcc=0,_hiddenTS=0;
function loop(ts){if(!_lastTS)_lastTS=ts;var dt=Math.min((ts-_lastTS)/1000,1);_lastTS=ts;if(GS.gameStarted){_cultAcc+=dt;if(_cultAcc>=1){_cultAcc-=1;var gtr=getTechRate();if(isNaN(gtr))gtr=0;if(isNaN(GS.cultivation))GS.cultivation=0;if(isNaN(GS.gold))GS.gold=0;GS.cultivation+=gtr;updateCultUI();}}requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ═══ 离线进度 ═══
document.addEventListener('visibilitychange',function(){
  if(!GS.gameStarted)return;
  if(document.hidden){_hiddenTS=Date.now();}
  else if(_hiddenTS>0){
    var elapsed=Math.floor((Date.now()-_hiddenTS)/1000);
    _hiddenTS=0;if(elapsed<5)return;
    // cultivation
    var gtr=getTechRate();if(isNaN(gtr))gtr=0;
    var cultGain=Math.floor(gtr*elapsed);
    // abyss simulation
    var kills=0,goldGain=0;
    if(AB.active){
      var s=getPlayerStats(),N=AB.floor;
      var mHp=Math.max(3,Math.floor(Math.pow(N,3)/2)),mDef=Math.floor(N*N/128+1);
      var edpr=Math.max(1,s.atk-mDef)*(1-AB.monster.dodge/100)*(1+s.crit/100*s.cdmg/100);
      if(isNaN(edpr))edpr=1;
      var rtk=mHp/Math.max(edpr,0.01),kps=1/(rtk*0.8+1);
      kills=Math.floor(kps*elapsed);if(isNaN(kills))kills=0;
      goldGain=Math.floor(kills*(N*3+N*N/10*s.goldMul));
    }
    if(isNaN(cultGain))cultGain=0;if(isNaN(goldGain))goldGain=0;
    GS.cultivation+=cultGain;GS.gold+=goldGain;
    var mins=Math.floor(elapsed/60),secs=elapsed%60;
    var timeStr=(mins>0?mins+'分':'')+secs+'秒';
    var msg='<div style="font-size:20px;color:var(--ink);margin-bottom:12px">你离开了 '+timeStr+'</div>'
      +'<div style="line-height:2;font-size:16px">'
      +'修炼获得：<span style="color:var(--ink)">'+fmt(cultGain)+' 修为</span><br>'
      +(kills>0?'击杀怪物：<span style="color:var(--ink)">'+kills+' 只</span><br>':'')
      +(goldGain>0?'灵石获得：<span style="color:var(--gold)">'+fmt(goldGain)+'</span><br>':'')
      +'</div><br><button class="btn sm" onclick="closeOffline()">确 认</button>';
    $('offline-msg').innerHTML=msg;$('ov-offline').classList.add('show');
    updateCultUI();if(AB.active)updateAbyssUI();
  }
});
function closeOffline(){$('ov-offline').classList.remove('show');}
</script>
